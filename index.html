<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wayan AI - Multi Model</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0B0F19; color: #E2E8F0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        /* Loading Dots */
        .typing span { animation: blink 1.4s infinite both; height: 5px; width: 5px; background: #94A3B8; border-radius: 50%; display: inline-block; margin: 0 1px; }
        .typing span:nth-child(2) { animation-delay: 0.2s; } .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="fixed top-0 w-full z-40 glass px-4 py-3 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="font-bold text-white text-lg">W</span>
            </div>
            <div>
                <h1 class="font-bold text-sm tracking-wide">WAYAN AI</h1>
                <div class="flex items-center gap-1.5">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></span>
                    <span id="model-badge" class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">Pilih Model</span>
                </div>
            </div>
        </div>
        <button onclick="deleteModel()" class="text-xs bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg transition border border-red-500/20">
            Reset AI
        </button>
    </header>

    <!-- SETUP SCREEN (Pilih Model) -->
    <section id="setup-screen" class="flex-1 flex flex-col items-center justify-center p-6 z-30 relative">
        <div class="w-full max-w-md space-y-6 animate-pop">
            <div class="text-center space-y-2">
                <h2 class="text-2xl font-bold text-white">Selamat Datang</h2>
                <p class="text-slate-400 text-sm">Pilih otak AI yang ingin Anda download ke perangkat ini.</p>
            </div>

            <div class="space-y-3">
                <!-- Pilihan 1: TinyLlama -->
                <label class="block glass p-4 rounded-xl cursor-pointer hover:bg-slate-800/50 transition border border-indigo-500/30 relative overflow-hidden group">
                    <input type="radio" name="model_select" value="TinyLlama-1.1B-Chat-v0.4-q4f16_1-MLC" class="peer hidden" checked>
                    <div class="absolute inset-0 border-2 border-indigo-500 opacity-0 peer-checked:opacity-100 rounded-xl transition"></div>
                    <div class="flex justify-between items-center relative z-10">
                        <div>
                            <div class="font-bold text-white flex items-center gap-2">⚡ TinyLlama <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded">Rekomen</span></div>
                            <div class="text-xs text-slate-400 mt-1">Ukuran: ±680 MB • Sangat Cepat</div>
                        </div>
                        <div class="w-4 h-4 rounded-full border border-slate-500 peer-checked:bg-indigo-500 peer-checked:border-indigo-500"></div>
                    </div>
                </label>

                <!-- Pilihan 2: Qwen -->
                <label class="block glass p-4 rounded-xl cursor-pointer hover:bg-slate-800/50 transition border border-slate-700 relative overflow-hidden group">
                    <input type="radio" name="model_select" value="Qwen2-1.5B-Instruct-q4f16_1-MLC" class="peer hidden">
                    <div class="absolute inset-0 border-2 border-indigo-500 opacity-0 peer-checked:opacity-100 rounded-xl transition"></div>
                    <div class="flex justify-between items-center relative z-10">
                        <div>
                            <div class="font-bold text-white">🧠 Qwen 1.5B</div>
                            <div class="text-xs text-slate-400 mt-1">Ukuran: ±1.0 GB • Pintar & Seimbang</div>
                        </div>
                        <div class="w-4 h-4 rounded-full border border-slate-500 peer-checked:bg-indigo-500 peer-checked:border-indigo-500"></div>
                    </div>
                </label>

                <!-- Pilihan 3: Gemma -->
                <label class="block glass p-4 rounded-xl cursor-pointer hover:bg-slate-800/50 transition border border-slate-700 relative overflow-hidden group">
                    <input type="radio" name="model_select" value="gemma-2b-it-q4f16_1-MLC" class="peer hidden">
                    <div class="absolute inset-0 border-2 border-indigo-500 opacity-0 peer-checked:opacity-100 rounded-xl transition"></div>
                    <div class="flex justify-between items-center relative z-10">
                        <div>
                            <div class="font-bold text-white">💎 Gemma 2B (Google)</div>
                            <div class="text-xs text-slate-400 mt-1">Ukuran: ±1.4 GB • Paling Cerdas</div>
                        </div>
                        <div class="w-4 h-4 rounded-full border border-slate-500 peer-checked:bg-indigo-500 peer-checked:border-indigo-500"></div>
                    </div>
                </label>
            </div>

            <button onclick="startDownload()" id="btn-start" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/25 transition transform active:scale-95">
                DOWNLOAD & MULAI
            </button>

            <!-- Loading UI -->
            <div id="loading-area" class="hidden space-y-2">
                <div class="flex justify-between text-xs font-mono text-indigo-300">
                    <span id="loading-status">Connecting...</span>
                    <span id="loading-percent">0%</span>
                </div>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300"></div>
                </div>
                <p class="text-[10px] text-slate-500 text-center pt-2">⚠️ Jangan matikan layar atau keluar dari browser.</p>
            </div>
            
            <div id="error-msg" class="hidden p-3 bg-red-900/30 border border-red-500/30 rounded-lg text-xs text-red-200 text-center"></div>
        </div>
    </section>

    <!-- CHAT SCREEN -->
    <main id="chat-screen" class="hidden flex-1 flex flex-col pt-16 pb-20 w-full max-w-3xl mx-auto relative">
        <div id="chat-box" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 hide-scrollbar scroll-smooth">
            <!-- Intro Bubble -->
            <div class="flex justify-center">
                <div class="bg-slate-800/50 text-slate-400 text-xs px-4 py-2 rounded-full border border-slate-700">
                    Wayan AI siap! Semua chat tersimpan lokal (Offline).
                </div>
            </div>
        </div>
    </main>

    <!-- INPUT AREA -->
    <footer id="input-area" class="hidden fixed bottom-0 w-full glass p-3 z-50">
        <div class="max-w-3xl mx-auto flex gap-2 items-end">
            <textarea id="user-input" rows="1" class="flex-1 bg-slate-800/80 text-white border border-slate-600 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm resize-none max-h-32 placeholder-slate-500" placeholder="Ketik pesan..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            <button onclick="sendMessage()" id="btn-send" class="p-3 bg-indigo-600 rounded-full text-white shadow-lg hover:bg-indigo-500 transition disabled:opacity-50 disabled:grayscale">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </footer>

    <!-- LOGIC -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine = null;
        let selectedModel = "";
        let messages = [];
        let wakeLock = null; // Agar layar tidak mati

        // --- 1. SETUP & DOWNLOAD ---

        window.startDownload = async function() {
            // Ambil model yang dipilih user
            const radios = document.getElementsByName('model_select');
            for (const radio of radios) {
                if (radio.checked) {
                    selectedModel = radio.value;
                    break;
                }
            }
            
            // UI Update
            const btn = document.getElementById("btn-start");
            const loadingArea = document.getElementById("loading-area");
            const errorMsg = document.getElementById("error-msg");
            
            btn.classList.add("hidden");
            loadingArea.classList.remove("hidden");
            errorMsg.classList.add("hidden");

            // Aktifkan Wake Lock (Agar layar HP tidak mati saat download)
            requestWakeLock();

            try {
                // Inisialisasi Engine AI
                engine = await webllm.CreateMLCEngine(
                    selectedModel,
                    { 
                        initProgressCallback: (info) => {
                            // Update text dan progress bar
                            document.getElementById("loading-status").innerText = info.text;
                            if(info.progress) {
                                const p = Math.round(info.progress * 100);
                                document.getElementById("progress-bar").style.width = p + "%";
                                document.getElementById("loading-percent").innerText = p + "%";
                            }
                        }
                    }
                );

                // BERHASIL!
                enterChatMode();

            } catch (err) {
                // ERROR HANDLING
                console.error(err);
                btn.classList.remove("hidden");
                loadingArea.classList.add("hidden");
                errorMsg.classList.remove("hidden");
                
                let pesanError = "Terjadi kesalahan.";
                if(err.message.includes("fetch") || err.message.includes("Network")) {
                    pesanError = "Gagal Download: Koneksi Internet terputus. Pastikan WiFi stabil.";
                } else if(err.message.includes("buffer")) {
                    pesanError = "Gagal: Memori HP tidak cukup. Coba tutup aplikasi lain atau pilih model TinyLlama.";
                } else {
                    pesanError = "Error: " + err.message;
                }
                errorMsg.innerText = pesanError;
            }
        }

        function enterChatMode() {
            document.getElementById("setup-screen").classList.add("hidden");
            document.getElementById("chat-screen").classList.remove("hidden");
            document.getElementById("input-area").classList.remove("hidden");
            
            // Update Header
            document.getElementById("status-dot").classList.replace("bg-yellow-500", "bg-green-500");
            document.getElementById("status-dot").classList.add("shadow-[0_0_8px_rgba(34,197,94,0.8)]");
            
            // Tampilkan nama model pendek
            let modelName = "AI";
            if(selectedModel.includes("Tiny")) modelName = "TinyLlama";
            else if(selectedModel.includes("Qwen")) modelName = "Qwen 1.5B";
            else if(selectedModel.includes("gemma")) modelName = "Gemma 2B";
            
            document.getElementById("model-badge").innerText = modelName + " (Ready)";
        }

        // --- 2. LOGIKA CHAT ---

        window.sendMessage = async function() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text || !engine) return;

            // Tampilkan Chat User
            addBubble(text, true);
            input.value = "";
            input.style.height = 'auto';
            document.getElementById("btn-send").disabled = true;

            // Loading Bubble
            const loadingId = addLoadingBubble();
            messages.push({ role: "user", content: text });

            try {
                const reply = await engine.chat.completions.create({ messages });
                const aiText = reply.choices[0].message.content;
                
                removeElement(loadingId);
                addBubble(aiText, false);
                messages.push({ role: "assistant", content: aiText });
                
            } catch (e) {
                removeElement(loadingId);
                addBubble("Maaf, ada error saat memproses jawaban.", false);
            }
            
            document.getElementById("btn-send").disabled = false;
        }

        function addBubble(text, isUser) {
            const box = document.getElementById("chat-box");
            
            // Format Markdown Bold & Code
            let cleanText = text
                .replace(/\n/g, "<br>")
                .replace(/\*\*(.*?)\*\*/g, "<b class='text-indigo-300'>$1</b>")
                .replace(/`(.*?)`/g, "<code class='bg-slate-700 px-1 py-0.5 rounded text-xs font-mono text-yellow-300'>$1</code>");

            const div = document.createElement("div");
            div.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-pop`;
            div.innerHTML = `
                <div class="max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed shadow-md ${
                    isUser 
                    ? 'bg-indigo-600 text-white rounded-tr-sm' 
                    : 'bg-slate-700 text-slate-200 rounded-tl-sm border border-slate-600'
                }">
                    ${cleanText}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function addLoadingBubble() {
            const box = document.getElementById("chat-box");
            const id = "load-" + Date.now();
            const div = document.createElement("div");
            div.id = id;
            div.className = "flex w-full justify-start animate-pop";
            div.innerHTML = `
                <div class="bg-slate-700/50 px-4 py-3 rounded-2xl rounded-tl-sm border border-slate-600/50">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return id;
        }

        // --- 3. UTILITIES ---

        window.autoResize = (el) => {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        window.handleEnter = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }

        // Fungsi agar layar tidak mati
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Screen Wake Lock active');
            } catch (err) {
                console.log('Wake Lock error:', err);
            }
        }

        window.deleteModel = async function() {
            if(!confirm("Hapus semua data AI? Anda harus download lagi nanti.")) return;
            const keys = await caches.keys();
            for(const k of keys) {
                if(k.includes("webllm")) await caches.delete(k);
            }
            alert("Memori bersih. Halaman akan dimuat ulang.");
            location.reload();
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
