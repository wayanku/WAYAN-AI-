<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wayan AI - Personal Assistant</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Custom UI Tweaks */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; touch-action: manipulation; }
        
        /* Scrollbar Halus */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Animasi Loading */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
            height: 6px; width: 6px; background-color: #94a3b8; border-radius: 50%; display: inline-block;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="glass fixed top-0 w-full z-50 px-4 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-indigo-500/50 shadow-lg">
                <span class="text-lg font-bold text-white">W</span>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-tight text-white">WAYAN AI</h1>
                <div class="flex items-center gap-2">
                    <span id="status-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <p id="status-text" class="text-xs text-slate-400">Offline Mode</p>
                </div>
            </div>
        </div>
        
        <!-- Menu Actions -->
        <div class="flex gap-2">
            <button onclick="resetChat()" title="Hapus Percakapan" class="p-2 rounded-lg hover:bg-slate-700 transition text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </button>
            <button onclick="deleteModel()" title="Hapus Model (Memory)" class="p-2 rounded-lg hover:bg-red-900/50 transition text-red-400 hover:text-red-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3zM9 9l6 6M15 9l-6 6"/></svg>
            </button>
        </div>
    </header>

    <!-- MAIN CHAT AREA -->
    <main class="flex-1 pt-20 pb-24 w-full max-w-4xl mx-auto relative">
        
        <!-- Welcome / Download Screen -->
        <div id="welcome-screen" class="flex flex-col items-center justify-center h-full p-6 text-center space-y-6">
            <div class="w-24 h-24 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-600 flex items-center justify-center shadow-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="text-white w-12 h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm1-5.5a2 2 0 1 0-4 0v.5h4z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Halo, saya Wayan.</h2>
            <p class="text-slate-400 max-w-md text-sm leading-relaxed">
                Asisten AI pribadi yang berjalan 100% di perangkat Anda. Privasi aman, tanpa server, bisa offline.
                <br><span class="text-indigo-400 text-xs mt-2 block">Model: Gemma-2B (Google) • Size: ±1.3GB</span>
            </p>
            
            <button id="btn-init" onclick="initWayan()" class="group relative px-8 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-full text-white font-semibold shadow-lg shadow-indigo-500/30 transition-all transform hover:scale-105 active:scale-95">
                <span>Download & Aktifkan Wayan</span>
                <div class="absolute inset-0 rounded-full ring-2 ring-white/20 group-hover:ring-white/40"></div>
            </button>

            <!-- Loading Bar -->
            <div id="progress-area" class="w-full max-w-xs hidden">
                <div class="flex justify-between text-xs text-slate-400 mb-1">
                    <span>Downloading Model...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 w-0 transition-all duration-300"></div>
                </div>
                <p id="progress-detail" class="text-[10px] text-slate-500 mt-2 text-center truncate">Menyiapkan engine...</p>
            </div>
        </div>

        <!-- Chat Container -->
        <div id="chat-container" class="hidden flex-col gap-4 px-4 h-full overflow-y-auto pb-4">
            <!-- Pesan akan muncul di sini -->
            <div class="flex justify-center mt-4">
                <span class="bg-slate-800 text-slate-400 text-xs px-3 py-1 rounded-full">Wayan AI Aktif. Percakapan ini privat & offline.</span>
            </div>
        </div>

    </main>

    <!-- INPUT AREA -->
    <footer id="input-area" class="hidden glass fixed bottom-0 w-full p-4 z-50">
        <div class="max-w-4xl mx-auto flex gap-3 items-end">
            <div class="flex-1 bg-slate-800/50 border border-slate-700 rounded-2xl flex items-center px-4 py-2 focus-within:ring-2 focus-within:ring-indigo-500/50 focus-within:border-indigo-500 transition-all">
                <textarea id="user-input" rows="1" class="w-full bg-transparent text-white placeholder-slate-500 focus:outline-none resize-none py-2 max-h-32 text-sm" placeholder="Ketik pesan untuk Wayan..." oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
            </div>
            <button id="btn-send" onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-full shadow-lg shadow-indigo-900/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform active:scale-90 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </footer>

    <!-- LOGIC SCRIPT -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const selectedModel = "gemma-2b-it-q4f16_1-MLC";
        let engine = null;
        let messages = []; 

        // --- Core Functions ---

        window.initWayan = async function() {
            const btnInit = document.getElementById("btn-init");
            const progressArea = document.getElementById("progress-area");
            
            btnInit.classList.add("hidden");
            progressArea.classList.remove("hidden");

            try {
                engine = await webllm.CreateMLCEngine(
                    selectedModel,
                    { 
                        initProgressCallback: (info) => {
                            document.getElementById("progress-detail").innerText = info.text;
                            if(info.progress) {
                                const percent = Math.round(info.progress * 100);
                                document.getElementById("progress-bar").style.width = `${percent}%`;
                                document.getElementById("progress-percent").innerText = `${percent}%`;
                            }
                        }
                    }
                );

                // Sukses
                document.getElementById("welcome-screen").classList.add("hidden");
                document.getElementById("chat-container").classList.remove("hidden");
                document.getElementById("chat-container").classList.add("flex");
                document.getElementById("input-area").classList.remove("hidden");
                
                // Update Status Indicator
                const statusDot = document.getElementById("status-indicator");
                statusDot.classList.remove("bg-red-500", "animate-pulse");
                statusDot.classList.add("bg-green-500", "shadow-[0_0_8px_rgba(34,197,94,0.6)]");
                document.getElementById("status-text").innerText = "Online (Ready)";

            } catch (err) {
                alert("Gagal memuat Wayan AI. Pastikan Browser Support WebGPU.");
                console.error(err);
                btnInit.classList.remove("hidden");
                progressArea.classList.add("hidden");
            }
        }

        window.sendMessage = async function() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text || !engine) return;

            // 1. Tampilkan Chat User
            appendMessage("user", text);
            input.value = "";
            input.style.height = "auto"; // Reset height textarea

            // 2. Tampilkan Loading Bubble
            const loadingId = appendLoading();
            disableInput(true);

            // 3. Proses AI
            messages.push({ role: "user", content: text });

            try {
                const reply = await engine.chat.completions.create({ messages });
                const replyText = reply.choices[0].message.content;
                
                // Hapus loading, ganti jawaban
                removeMessage(loadingId);
                appendMessage("ai", replyText);
                messages.push({ role: "assistant", content: replyText });

            } catch (err) {
                removeMessage(loadingId);
                appendMessage("ai", "Maaf, Wayan mengalami error. Coba reset chat.");
            }

            disableInput(false);
        }

        // --- UI Helper Functions ---

        function appendMessage(role, text) {
            const container = document.getElementById("chat-container");
            const isUser = role === "user";
            
            // Format teks sederhana (Bold & Newline)
            let formattedText = text
                .replace(/\n/g, "<br>")
                .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>") // Bold Markdown
                .replace(/`(.*?)`/g, "<code class='bg-slate-700 px-1 rounded text-sm text-yellow-400'>$1</code>"); 

            const html = `
                <div class="flex w-full ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in">
                    <div class="max-w-[85%] ${isUser ? 'bg-indigo-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-slate-700 text-slate-200 rounded-r-2xl rounded-tl-2xl'} px-4 py-3 shadow-md relative">
                        <p class="text-sm leading-relaxed">${formattedText}</p>
                        ${!isUser ? '<div class="absolute -left-2 top-0 w-2 h-2 bg-slate-700 [clip-path:polygon(100%_0,0_0,100%_100%)]"></div>' : '<div class="absolute -right-2 top-0 w-2 h-2 bg-indigo-600 [clip-path:polygon(0_0,100%_0,0_100%)]"></div>'}
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function appendLoading() {
            const container = document.getElementById("chat-container");
            const id = "loading-" + Date.now();
            const html = `
                <div id="${id}" class="flex w-full justify-start">
                    <div class="bg-slate-700 rounded-r-2xl rounded-tl-2xl px-4 py-4 shadow-md flex items-center gap-1">
                        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }

        function scrollToBottom() {
            const container = document.getElementById("chat-container");
            container.scrollTop = container.scrollHeight;
        }

        function disableInput(state) {
            document.getElementById("btn-send").disabled = state;
            document.getElementById("user-input").disabled = state;
            if(!state) document.getElementById("user-input").focus();
        }

        window.autoResize = function(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        window.handleEnter = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        }

        window.resetChat = function() {
            document.getElementById("chat-container").innerHTML = '<div class="flex justify-center mt-4"><span class="bg-slate-800 text-slate-400 text-xs px-3 py-1 rounded-full">Chat Direset.</span></div>';
            messages = [];
            if(engine) engine.resetChat();
        }

        window.deleteModel = async function() {
            if(confirm("⚠ PERINGATAN: Ini akan menghapus file otak Wayan AI (±1.3GB) dari HP Anda.\n\nAnda harus download ulang jika ingin memakai lagi. Lanjutkan?")) {
                const cacheNames = await caches.keys();
                let deleted = false;
                for (const name of cacheNames) {
                    if (name.includes("webllm")) {
                        await caches.delete(name);
                        deleted = true;
                    }
                }
                if(deleted) {
                    alert("Model berhasil dihapus! Halaman akan dimuat ulang.");
                    location.reload();
                } else {
                    alert("Cache sudah kosong atau tidak ditemukan.");
                }
            }
        }

        // SW Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
